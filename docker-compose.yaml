version: "3.9"

services:
  db:
    image: postgres:16
    container_name: coop-postgres
    environment:
      POSTGRES_DB: coop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: coop-loan-app
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/coop
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    ports:
      - "8080:8080"

volumes:
  postgres_data: